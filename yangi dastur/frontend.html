<!DOCTYPE html>
<html>
<head>
    <title>Kirish va Ro'yxatdan o'tish</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        form { border: 1px solid #ccc; padding: 20px; margin-bottom: 20px; border-radius: 10px; width: 300px; }
        input { width: 90%; margin-bottom: 10px; padding: 8px; }
        button { width: 100%; padding: 10px; cursor: pointer; background: #007bff; color: white; border: none; }
    </style>
</head>
<body>

    <h2>Ro'yxatdan o'tish</h2>
    <form id="regForm">
        <input type="text" id="regUser" placeholder="Login yarating" required>
        <input type="password" id="regPass" placeholder="Parol yarating" required>
        <button type="submit">Ro'yxatdan o'tish</button>
    </form>

    <h2>Tizimga kirish</h2>
    <form id="loginForm">
        <input type="text" id="loginUser" placeholder="Loginingiz" required>
        <input type="password" id="loginPass" placeholder="Parolingiz" required>
        <button type="submit">Kirish</button>
    </form>

    <script>
        // Ro'yxatdan o'tish
        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch('/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: document.getElementById('regUser').value,
                    password: document.getElementById('regPass').value
                })
            });
            alert(await res.text());
        };

        // Kirish
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: document.getElementById('loginUser').value,
                    password: document.getElementById('loginPass').value
                })
            });
            const data = await res.json();
            if (data.success) {
                window.location.href = data.redirect; // Kun.uz ga yuborish
            } else {
                alert(data.message);
            }
        };
    </script>
</body>
</html>
