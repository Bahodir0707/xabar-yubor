<!DOCTYPE html>
<html>
<head>
    <title>Aloqa Formasi</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; }
        form { display: flex; flex-direction: column; width: 300px; gap: 10px; }
        input, button { padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { background: #0088cc; color: white; cursor: pointer; border: none; }
    </style>
</head>
<body>
    <form action="/send-data" method="POST">
        <h3>Ma'lumot qoldiring</h3>
        <input type="text" name="name" placeholder="Ismingiz" required>
        <input type="text" name="phone" placeholder="Telefon raqamingiz" required>
        <textarea name="message" placeholder="Xabar" rows="4"></textarea>
        <button type="submit">Yuborish</button>
    </form>
</body>
</html>
