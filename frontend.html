<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature Login & Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        
        /* Asosiy fon (Login uchun tabiat rasmi) */
        body {
            background-image: url('https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?q=80&w=1920&auto=format&fit=crop'); /* Login foni */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-image 0.5s ease-in-out; /* Fon almashganda silliq o'tish */
        }

        /* Ro'yxatdan o'tish sahifasi uchun fon rasmi */
        body.register-mode {
            background-image: url('https://images.unsplash.com/photo-1472396961693-142e6e269027?q=80&w=1920&auto=format&fit=crop'); /* Register foni */
        }

        .container {
            background: rgba(0, 0, 0, 0.4); /* To'qroq oynasimon effekt */
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 50px 40px;
            border-radius: 30px;
            width: 420px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            color: white;
            text-align: center;
            transition: transform 0.3s ease;
        }
        
        h2 { margin-bottom: 35px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; font-size: 24px; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        
        .input-group { margin-bottom: 25px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: rgba(255, 255, 255, 0.9); }
        
        input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        input::placeholder { color: rgba(255, 255, 255, 0.4); }
        input:focus { background: rgba(255, 255, 255, 0.2); border-color: #2ecc71; box-shadow: 0 0 15px rgba(46, 204, 113, 0.3); }
        
        /* Chiroyli yashil tugma (Tabiatga mos) */
        button {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3);
        }
        button:hover { background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%); transform: translateY(-3px); box-shadow: 0 8px 20px rgba(46, 204, 113, 0.4); }
        button:active { transform: translateY(-1px); }
        
        .toggle-link { margin-top: 25px; font-size: 14px; color: rgba(255, 255, 255, 0.8); }
        .toggle-link span { text-decoration: none; color: #2ecc71; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .toggle-link span:hover { color: #fff; text-shadow: 0 0 5px rgba(255,255,255,0.5); }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginSection">
        <h2>Tizimga Kirish</h2>
        <form id="loginForm">
            <div class="input-group">
                <label>Foydalanuvchi nomi</label>
                <input type="text" id="loginUser" placeholder="Loginingizni yozing" required>
            </div>
            <div class="input-group">
                <label>Parol</label>
                <input type="password" id="loginPass" placeholder="••••••••" required>
            </div>
            <button type="submit">Kirish</button>
        </form>
        <p class="toggle-link">Akkauntingiz yo'qmi? <span onclick="toggleForms()">Ro'yxatdan o'tish</span></p>
    </div>

    <div id="regSection" class="hidden">
        <h2>Ro'yxatdan o'tish</h2>
        <form id="regForm">
            <div class="input-group">
                <label>Yangi Login</label>
                <input type="text" id="regUser" placeholder="Login tanlang" required>
            </div>
            <div class="input-group">
                <label>Yangi Parol</label>
                <input type="password" id="regPass" placeholder="Kamida 6 ta belgi" required>
            </div>
            <button type="submit">Saqlash</button>
        </form>
        <p class="toggle-link">Akkauntingiz bormi? <span onclick="toggleForms()">Loginga qaytish</span></p>
    </div>
</div>

<script>
    function toggleForms() {
        document.getElementById('loginSection').classList.toggle('hidden');
        document.getElementById('regSection').classList.toggle('hidden');
        // Fon rasmini o'zgartirish uchun klass qo'shish/ochirish
        document.body.classList.toggle('register-mode');
    }

    // Register harakati
    document.getElementById('regForm').onsubmit = async (e) => {
        e.preventDefault();
        const res = await fetch('/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: document.getElementById('regUser').value,
                password: document.getElementById('regPass').value
            })
        });
        if(res.ok) {
            alert("Muvaffaqiyatli ro'yxatdan o'tdingiz! Endi login orqali kiring.");
            toggleForms(); // Avtomatik Login oynasiga qaytaradi
        } else {
            alert("Xatolik yuz berdi yoki bu login band.");
        }
    };

    // Login harakati
    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        const res = await fetch('/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: document.getElementById('loginUser').value,
                password: document.getElementById('loginPass').value
            })
        });
        const data = await res.json();
        if (data.success) {
            window.location.href = data.redirect;
        } else {
            alert("Login yoki parol xato!");
        }
    };
</script>

</body>
</html>
